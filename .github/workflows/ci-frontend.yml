name: Frontend CI

on:
    push:
        branches:
            - main
        paths:
            - "frontend/**"
            - ".github/workflows/ci-frontend.yml"
    pull_request: 
        branches:
            - main
        paths:
            - "frontend/**"
            - ".github/workflows/ci-frontend.yml"

defaults:
    run:
        working-directory: frontend

jobs:
    build-and-lint:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                node-version: "24"
                cache: "npm"
                cache-dependency-path: frontend/package-lock.json
            
            - name: Install dependencies
              run: npm ci
            
            - name: Lint
              run: npm run lint
            
            - name: Build
              run: npm run build