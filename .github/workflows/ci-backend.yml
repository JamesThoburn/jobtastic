name: Backend CI

on:
    push:
        branches: 
            - main
        paths:
            - "backend/**"
            - ".github/workflows/ci-backend.yml"
    pull_request:
        branches:
            - main
        paths:
            - "backend/**"
            - ".github/workflows/ci-backend.yml"

jobs:
    build-and-test:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: backend
        
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up JDK 25
              uses: actions/setup-java@v4
              with:
                java-version: "25"
                distribution: "temurin"
                cache: "maven"
            
            - name: Build and Test
              run: ./mvnw clean verify